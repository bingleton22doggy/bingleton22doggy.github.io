<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing's Hub - Nebula Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-heavy: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: #020205;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* --- NEBULA & STARS BACKGROUND --- */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0b2e 0%, #020205 100%);
        }

        .nebula-overlay {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(75, 0, 130, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 50, 150, 0.3) 0%, transparent 50%);
            filter: blur(80px);
            animation: nebulaDrift 20s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes nebulaDrift {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(2%, 2%); }
        }

        /* --- HEADER --- */
        .header {
            margin-top: 60px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
            z-index: 5;
        }

        .welcome-text {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 200;
            letter-spacing: 6px;
            margin-bottom: 15px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* New Refresh Button Style */
        .refresh-btn {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 25px;
            width: fit-content;
            color: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin: 10px auto 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        .refresh-btn:hover {
            background: var(--glass-heavy);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            color: white;
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn svg {
            transition: transform 0.6s ease;
        }

        .refresh-btn:hover svg {
            transform: rotate(180deg);
        }

        /* --- THE WHEEL --- */
        .wheel-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateIn 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .ring-guide {
            position: absolute;
            width: 420px;
            height: 420px;
            border: 1px dashed rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: slowRotate 30s linear infinite;
        }

        .app-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2;
        }

        .icon-wrapper {
            width: 85px;
            height: 85px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .app-item:hover .icon-wrapper::after {
            left: 100%;
        }

        .app-label {
            margin-top: 14px;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .app-item:hover { z-index: 10; }
        .app-item:hover .icon-wrapper {
            transform: scale(1.15) translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 45px rgba(0, 210, 255, 0.4);
        }

        /* --- DOCK --- */
        .dock {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .dock-item {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dock-item:hover {
            background: var(--glass-heavy);
            transform: translateY(-10px) scale(1.2);
            border-color: var(--accent);
        }

        /* --- REFRESH OVERLAY EFFECT --- */
        .refresh-flash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes rotateIn { from { opacity: 0; transform: translate(-50%, -50%) rotate(-45deg) scale(0.5); } to { opacity: 1; transform: translate(-50%, -50%) rotate(0) scale(1); } }
        @keyframes slowRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .wheel-container { width: 90vw; height: 90vw; }
            .ring-guide { width: 75vw; height: 75vw; }
            .icon-wrapper { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>

    <div class="refresh-flash" id="flash"></div>

    <div id="canvas-container">
        <canvas id="starCanvas"></canvas>
        <div class="nebula-overlay"></div>
    </div>

    <div class="header">
        <h1 class="welcome-text">Welcome, Marshall</h1>
        <button class="refresh-btn" onclick="refreshSystem()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
            Refresh Hub
        </button>
    </div>

    <div class="wheel-container" id="wheel">
        <div class="ring-guide"></div>
        
        <a href="editor.html" class="app-item">
            <div class="icon-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </div>
            <span class="app-label">Code Editor</span>
        </a>

        <a href="ttttt-ttt-tttiddies.html" class="app-item">
            <div class="icon-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
            </div>
            <span class="app-label">Bullet Fate</span>
        </a>

        <a href="mobile.html" class="app-item">
            <div class="icon-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
            </div>
            <span class="app-label">Mobile</span>
        </a>

        <a href="screensaver.html" class="app-item">
            <div class="icon-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            </div>
            <span class="app-label">Screensaver</span>
        </a>
    </div>

    <div class="dock">
        <div class="dock-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </div>
        <div class="dock-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <div class="dock-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        </div>
    </div>

    <script>
        // --- REFRESH LOGIC ---
        function refreshSystem() {
            const flash = document.getElementById('flash');
            flash.style.opacity = '0.3';
            setTimeout(() => {
                flash.style.opacity = '0';
                window.location.reload();
            }, 300);
        }

        // --- STARFIELD LOGIC ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let swooshingStars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.05
                });
            }
        }

        function createSwoosh() {
            if (swooshingStars.length < 3) {
                swooshingStars.push({
                    x: -100,
                    y: Math.random() * canvas.height,
                    length: 100 + Math.random() * 200,
                    speed: 15 + Math.random() * 25,
                    opacity: 1
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.opacity += (Math.random() - 0.5) * 0.05;
                if(star.opacity < 0) star.opacity = 0;
                if(star.opacity > 1) star.opacity = 1;
            });
            swooshingStars.forEach((star, index) => {
                ctx.strokeStyle = `rgba(0, 210, 255, ${star.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(star.x, star.y);
                ctx.lineTo(star.x - star.length, star.y);
                ctx.stroke();
                star.x += star.speed;
                if (star.x - star.length > canvas.width) {
                    swooshingStars.splice(index, 1);
                }
            });
            if (Math.random() < 0.02) createSwoosh();
            requestAnimationFrame(drawStars);
        }

        // --- APP ARRANGEMENT ---
        function arrangeApps() {
            const items = document.querySelectorAll('.app-item');
            const total = items.length;
            const wheel = document.getElementById('wheel');
            const radius = wheel.offsetWidth * 0.42;
            
            items.forEach((item, index) => {
                const angle = (index / total) * 2 * Math.PI - (Math.PI / 2);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                item.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        window.addEventListener('load', () => {
            initCanvas();
            drawStars();
            arrangeApps();
        });

        window.addEventListener('resize', () => {
            initCanvas();
            setTimeout(arrangeApps, 50);
        });
    </script>
</body>
</html>
