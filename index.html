<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshall's Hub</title>
    <style>
        :root {
            --bg-image: url('kida.png');
            --icon-image: url('example.png');
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), var(--bg-image);
            background-size: cover;
            background-position: center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        /* Top Header Area */
        .header {
            margin-top: 40px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .welcome-text {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .search-bar {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 12px 30px;
            width: 300px;
            color: white;
            text-align: center;
            font-size: 0.9rem;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* The Circular Launcher Logic */
        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Visible guide ring */
        .ring-guide {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .app-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-image: var(--icon-image);
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 2px solid transparent;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .app-label {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            opacity: 0.8;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        /* Hover States */
        .app-item:hover {
            transform: scale(1.15) !important; /* Scale overrides our dynamic positioning scale slightly */
            z-index: 10;
        }

        .app-item:hover .icon-wrapper {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent);
        }

        .app-item:hover .app-label {
            opacity: 1;
            color: var(--accent);
        }

        /* Bottom Navbar placeholder for look/feel */
        .dock {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 25px;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .dock-item {
            width: 50px;
            height: 50px;
            background: var(--glass);
            border-radius: 12px;
            opacity: 0.7;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateIn {
            from { opacity: 0; transform: rotate(-45deg) scale(0.8); }
            to { opacity: 1; transform: rotate(0) scale(1); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .wheel-container {
                width: 100vw;
                height: 100vw;
            }
            .ring-guide {
                width: 75vw;
                height: 75vw;
            }
            .welcome-text {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="welcome-text">Welcome, Marshall!</h1>
        <div class="search-bar">Search Application</div>
    </div>

    <div class="wheel-container" id="wheel">
        <div class="ring-guide"></div>
        
        <!-- Apps will be positioned by JavaScript -->
        <a href="editor.html" class="app-item">
            <div class="icon-wrapper"></div>
            <span class="app-label">Code Editor</span>
        </a>

        <a href="ttttt-ttt-tttiddies.html" class="app-item">
            <div class="icon-wrapper"></div>
            <span class="app-label">Bullet Fate</span>
        </a>

        <a href="mobile.html" class="app-item">
            <div class="icon-wrapper"></div>
            <span class="app-label">Bullet Fate Mobile</span>
        </a>

        <a href="screensaver.html" class="app-item">
            <div class="icon-wrapper"></div>
            <span class="app-label">Screensaver</span>
        </a>
    </div>

    <div class="dock">
        <div class="dock-item"></div>
        <div class="dock-item"></div>
        <div class="dock-item"></div>
    </div>

    <script>
        function arrangeApps() {
            const items = document.querySelectorAll('.app-item');
            const total = items.length;
            const radius = window.innerWidth < 600 ? (window.innerWidth * 0.375) : 200; // Responsive radius
            
            items.forEach((item, index) => {
                // Calculate angle: distribute evenly around the circle
                // Starting at -90 degrees (top)
                const angle = (index / total) * 2 * Math.PI - (Math.PI / 2);
                
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                item.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        // Run on load and on resize
        window.addEventListener('load', arrangeApps);
        window.addEventListener('resize', arrangeApps);
    </script>
</body>
</html>
